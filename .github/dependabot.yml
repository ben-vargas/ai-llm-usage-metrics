version: 2
updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
    open-pull-requests-limit: 10
    versioning-strategy: increase
    commit-message:
      prefix: chore(deps)
    labels:
      - dependencies
      - security
    groups:
      production-dependencies:
        dependency-type: production
      development-dependencies:
        dependency-type: development

  - package-ecosystem: npm
    directory: /site
    schedule:
      interval: weekly
    open-pull-requests-limit: 10
    versioning-strategy: increase
    commit-message:
      prefix: chore(site-deps)
    labels:
      - dependencies
      - security
    groups:
      site-dependencies:
        patterns:
          - '*'

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    open-pull-requests-limit: 10
    commit-message:
      prefix: chore(ci)
    labels:
      - dependencies
      - security
